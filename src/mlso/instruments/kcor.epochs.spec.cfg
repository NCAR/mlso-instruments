# only contain relevant display info from kcor-pipeline 
[DEFAULT]
mlso_url                        : type=str, default=www2.hao.ucar.edu/mlso
doi_url                         : type=str, default=https://doi.org/10.5065/D69G5JV8

# display multiplies values, min, and max by 1.0e6 before performing BYTSCL

cropped_display_min             : type=float, default=0.0
cropped_display_max             : type=float, default=1.0e-6
cropped_display_exp             : type=float, default=0.8

display_min                     : type=float, default=-0.007e-6
display_max                     : type=float, default=0.8e-6
display_exp                     : type=float, default=0.7
display_gamma                   : type=float, default=0.7

display_intensity_min           : type=float, default=-0.007e-6
display_intensity_max           : type=float, default=1.0e-5
display_intensity_exp           : type=float, default=0.7
display_intensity_gamma         : type=float, default=0.7

# display values for difference images
display_difference_min          : type=float, default=-2.0e-8
display_difference_max          : type=float, default=3.0e-8

cmin                            : type=float, default=200.0
bmax                            : type=float, default=2.0e6
smax                            : type=int, default=4294967295
cmax                            : type=float, default=5.0e7
check_noise                     : type=boolean, default=NO

# synoptic map configuration: these heights/names must match the database
# definition in bin/kcor_sci_create_table.pl and heights used in
# src/database/kcor_sci_insert.pro
#synoptic_heights                : type=float, extract=YES, default=[1.11, 1.15, 1.20, 1.35, 1.50, 1.75, 2.00, 2.25, 2.50]
#synoptic_height_names           : type=str, extract=YES, default=[r111, r115, r12, r135, r15, r175, r20, r225, r25]
#synoptic_display_minimums       : type=float, extract=YES, default=[0.020, 0.020, 0.020, 0.006, 0.001, -0.008, -0.008, -0.008, -0.008]
#synoptic_display_maximums       : type=float, extract=YES, default=[1.00, 0.900, 0.800, 0.500, 0.350, 0.150, 0.090, 0.050, 0.030]
# total width of annulus, i.e., synoptic_heights +/- synoptic_map_annulus_width / 2.0
#synoptic_map_annulus_width      : type=float, default=0.04
#synoptic_map_gamma              : type=float, default=0.7
